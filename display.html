<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Box Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:#0A0908;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Outfit',sans-serif;
  -webkit-font-smoothing:antialiased;
}

.card{
  background:#141210;
  border:1px solid #1E1C18;
  padding:44px 40px;
  width:340px;
  text-align:center;
  position:relative;
}
/* Coins dorés décoratifs */
.card::before,.card::after,.corner-b::before,.corner-b::after{
  content:'';position:absolute;width:16px;height:16px;
  border-color:#7A6230;border-style:solid;
}
.card::before{top:-2px;left:-2px;border-width:2px 0 0 2px}
.card::after{top:-2px;right:-2px;border-width:2px 2px 0 0}
.corner-b::before{bottom:-2px;left:-2px;border-width:0 0 2px 2px}
.corner-b::after{bottom:-2px;right:-2px;border-width:0 2px 2px 0}

.status{
  display:inline-flex;align-items:center;gap:7px;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:#4A4640;margin-bottom:20px;
}
.dot{
  width:6px;height:6px;background:#2A7A4A;border-radius:50%;
  animation:blink 2s ease infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.amount{
  font-family:'Cormorant Garamond',serif;
  font-size:60px;font-weight:300;color:#C8A45C;line-height:1;margin-bottom:6px;
}
.desc{font-size:13px;color:#4A4640;margin-bottom:28px;line-height:1.5}

/* Cadre QR */
.qr-frame{
  background:white;
  padding:14px;
  display:inline-block;
  margin-bottom:24px;
  position:relative;
}
.qr-frame::before,.qr-frame::after,.qr-corners::before,.qr-corners::after{
  content:'';position:absolute;width:12px;height:12px;
  border-color:#C8A45C;border-style:solid;
}
.qr-frame::before{top:-3px;left:-3px;border-width:2px 0 0 2px}
.qr-frame::after{top:-3px;right:-3px;border-width:2px 2px 0 0}
.qr-corners::before{bottom:-3px;left:-3px;border-width:0 0 2px 2px}
.qr-corners::after{bottom:-3px;right:-3px;border-width:0 2px 2px 0}

.cta{font-size:14px;color:#6A6258;line-height:1.9}
.cta strong{display:block;color:#E8DFD0;font-weight:500;font-size:15px;margin-bottom:4px}

/* ── CONFIG PANEL (caché en prod) ── */
.cfg{
  position:fixed;bottom:0;left:0;right:0;
  background:#0D0C0A;border-top:1px solid #1E1C18;
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
}
.cfg label{font-size:11px;letter-spacing:1px;color:#4A4640;text-transform:uppercase}
.cfg input{
  background:#1A1814;border:1px solid #2A2620;color:#E8DFD0;
  font-family:'Outfit',sans-serif;font-size:14px;
  padding:6px 10px;outline:none;width:120px;
}
.cfg input:focus{border-color:#C8A45C}
.cfg-btn{
  background:#C8A45C;color:#0A0908;border:none;
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  padding:8px 18px;cursor:pointer;margin-left:auto;
}
</style>
</head>
<body>

<div class="card">
  <div class="corner-b"></div>

  <div class="status"><div class="dot"></div>Disponible</div>
  <div class="amount" id="d-amount">12,00 €</div>
  <div class="desc" id="d-desc">Box Apéritif — Chambre 4</div>

  <div class="qr-frame">
    <div class="qr-corners"></div>
    <div id="qr"></div>
  </div>

  <div class="cta">
    <strong>Scannez pour accéder à la box</strong>
    Appareil photo de votre téléphone<br>
    sur le QR · Paiement sécurisé en ligne
  </div>
</div>

<!-- Panneau admin (visible uniquement sur cet écran) -->
<div class="cfg">
  <label>Lien pay.html :</label>
  <input id="cfg-url" type="text" placeholder="https://xxx.netlify.app/pay.html" style="width:280px"/>
  <label>Montant :</label>
  <input id="cfg-amt" type="text" placeholder="12,00 €" style="width:90px"/>
  <label>Description :</label>
  <input id="cfg-desc" type="text" placeholder="Box Apéritif" style="width:180px"/>
  <button class="cfg-btn" onclick="updateQR()">Générer QR</button>
</div>

<script>
let qrInstance = null;

function buildQR(url) {
  const container = document.getElementById('qr');
  container.innerHTML = '';
  qrInstance = new QRCode(container, {
    text:         url,
    width:        200,
    height:       200,
    colorDark:    "#0A0908",
    colorLight:   "#ffffff",
    correctLevel: QRCode.CorrectLevel.H,
  });
}

function updateQR() {
  const url  = document.getElementById('cfg-url').value.trim();
  const amt  = document.getElementById('cfg-amt').value.trim();
  const desc = document.getElementById('cfg-desc').value.trim();

  if (!url) { alert("Entrez d'abord l'URL de pay.html hébergé"); return; }

  if (amt)  document.getElementById('d-amount').textContent = amt;
  if (desc) document.getElementById('d-desc').textContent   = desc;

  buildQR(url);
}

// QR par défaut — sera mis à jour après hébergement
buildQR("https://VOTRE-URL.netlify.app/pay.html");
</script>
</body>
</html>
